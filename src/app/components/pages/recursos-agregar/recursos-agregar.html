<div class="contents expanded">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">

                <div class="breadcrumb-main">
                    <h4 class="breadcrumb-title text-capitalize">Agregar libros</h4>

                    <div class="breadcrumb-action justify-content-center flex-wrap">
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item">
                                    <a style="cursor: pointer;" routerLink="/burritoadministrador/recursos">
                                        <i class="uil uil-estate"></i>Libros
                                    </a>
                                </li>
                                <li class="breadcrumb-item">
                                    <a style="cursor: pointer;" routerLink="/burritoadministrador/recursos/agregar">
                                        <i class="uil uil-book-open"></i>Agregar libro
                                    </a>
                                </li>
                            </ol>
                        </nav>
                    </div>
                </div>

            </div>
        </div>

        <!-- Formulario -->
        <div class="row">

            <div class="col-lg-12">

                <div class="card card-default card-md">

                    <div class="card-header">
                        <h4 class="mb-0">
                            Información del Libro
                        </h4>
                    </div>

                    <div class="card-body py-4">

                        <div class="row">

                            <!-- COLUMNA IZQUIERDA -->
                            <div class="col-lg-6">

                                <!-- Título -->
                                <div class="form-group mb-4">
                                    <label class="form-label fw-bold">
                                        Título
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control ih-medium ip-lightradius-xs b-light"
                                        placeholder="Ingrese el título del libro">
                                </div>

                                <!-- Editorial -->
                                <div class="form-group mb-4">
                                    <label class="form-label fw-bold">
                                        Editorial
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control ih-medium ip-lightradius-xs b-light"
                                        placeholder="Ingrese la editorial">
                                </div>

                                <!-- Sinopsis -->
                                <div class="form-group mb-4">
                                    <label class="form-label fw-bold">
                                        Sinopsis
                                    </label>

                                    <textarea
                                        class="form-control b-light"
                                        rows="8"
                                        placeholder="Ingrese la sinopsis del libro">
                                    </textarea>
                                </div>

                                <!-- Botones -->
                                <div class="d-flex gap-3">

                                    <button
                                        type="button"
                                        class="btn btn-primary btn-default btn-squared px-4">

                                        Agregar
                                    </button>

                                    <button
                                        type="button"
                                        class="btn btn-outline-secondary btn-default btn-squared px-4">

                                        Cancelar
                                    </button>

                                </div>

                            </div>

                            <!-- COLUMNA DERECHA -->
                            <div class="col-lg-6">

                                <!-- Autores -->
                                <div class="form-group mb-4">
                                    <label class="form-label fw-bold">
                                        Autor(es)
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control ih-medium ip-lightradius-xs b-light"
                                        placeholder="Ingrese el autor o autores">
                                </div>

                                <!-- Género -->
                                <div class="form-group mb-4">
                                    <label class="form-label fw-bold">
                                        Género
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control ih-medium ip-lightradius-xs b-light"
                                        placeholder="Ingrese el género">
                                </div>

                                <!-- Vista previa de imagen -->
                                <div class="form-group mb-4">

                                    <label class="form-label fw-bold">
                                        Imagen del libro
                                    </label>

                                    <div
                                        class="border rounded d-flex justify-content-center align-items-center"
                                        style="height: 250px;">

                                        <img
                                            src="assets/img/libro-placeholder.png"
                                            alt="Vista previa"
                                            class="img-fluid"
                                            style="max-height: 230px;">

                                    </div>

                                </div>

                                <!-- Ruta de imagen -->
                                <div class="form-group">

                                    <label class="form-label fw-bold">
                                        Dirección de la imagen
                                    </label>

                                    <div class="input-group">

                                        <input
                                            type="text"
                                            class="form-control"
                                            placeholder="Seleccione una imagen">

                                        <button
                                            class="btn btn-primary"
                                            type="button">

                                            Elegir imagen
                                        </button>

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
