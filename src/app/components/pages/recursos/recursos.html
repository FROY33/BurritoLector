<div class="contents expanded">
   <div class="container-fluid">
      <div class="row">
         <div class="col-lg-12">

            <div class="breadcrumb-main">
               <h4 class="text-capitalize breadcrumb-title">Libros</h4>

               <div class="breadcrumb-action justify-content-center flex-wrap">
                  <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                           <li class="breadcrumb-item">
                              <a style="cursor: pointer;" routerLink="/burritoadministrador/recursos">
                                    <i class="uil uil-estate"></i>Libros
                              </a>
                           </li>
                        </ol>
                  </nav>
               </div>
            </div>
         </div>
      </div>

      <div class="row">
         <div class="col-12">
            <div class="card">
               <div class="card-body p-0">
                  <div class="table4 p-25 mb-10">

                     <div class="table-responsive">
                        <table class="table mb-0">
                           <thead>
                              <tr class="userDatatable-header">
                                 <th><span class="userDatatable-title">Título</span></th>
                                 <th><span class="userDatatable-title">Autor</span></th>
                                 <th><span class="userDatatable-title">Acciones</span></th>
                              </tr>
                           </thead>
                           <tbody>
                              @if (loading()) {
                                 <tr><td colspan="3">Cargando libros...</td></tr>
                              } @else {
                                 @for (libro of libros(); track libro.id) {
                                    <tr>
                                       <td><div class="userDatatable-content">{{ libro.title }}</div></td>
                                       <td><div class="userDatatable-content">{{ libro.author }}</div></td>
                                       <td>
                                          <div class="userDatatable-content d-flex gap-2">
                                             <button class="btn btn-primary btn-sm"
                                                     [routerLink]="['/burritoadministrador/recursos/editar', libro.id]">
                                                Editar
                                             </button>
                                             <button type="button" class="btn btn-outline-secondary btn-default btn-squared px-4" [routerLink]="['/burritoadministrador/recursos/eliminar', libro.id]">
                                                Eliminar
                                             </button>
                                          </div>
                                       </td>
                                    </tr>
                                 }
                              }
                           </tbody>
                        </table>
                     </div>

                  </div>
                  <button class="btn btn-primary btn-sm" style="margin-bottom: 25px; margin-left: 25px;" routerLink="/burritoadministrador/recursos/agregar">
                     Agregar
                  </button>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>
