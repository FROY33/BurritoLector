<div class="contents expanded">
   <div class="container-fluid">
      <div class="row">
         <div class="col-lg-12">
            <div class="breadcrumb-main">
               <h4 class="text-capitalize breadcrumb-title">GALERÍA</h4>
               <div class="breadcrumb-action justify-content-center flex-wrap">
                  <nav aria-label="breadcrumb">
                     <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#"><i class="uil uil-estate"></i>Inicio</a></li>
                        <li class="breadcrumb-item active" aria-current="page">libros</li>
                     </ol>
                  </nav>
               </div>
            </div>
         </div>

         <div class="col-12">
            @if (loading()) {
               <p>Cargando libros...</p>
            } @else {
               <div class="row">
                  @for (libro of libros(); track libro.id) {
                     <div class="col-xxl-3 col-lg-4 col-md-6 mb-25">
                        <div class="feature-cards">
                           <figure class="feature-cards__figure">
                              <img [src]="libro.coverImageUrl || 'img/blog-single1.png'" [alt]="libro.title">
                              <figcaption>
                                 <h4>{{ libro.title }}</h4>
                                 <p>{{ truncar(libro.synopsis) }}</p>
                                 <button [routerLink]="['/burritolector/libro', libro.id]" class="btn-md btn">Ver más</button>
                              </figcaption>
                           </figure>
                        </div>
                     </div>
                  }
               </div>

               <div class="d-flex justify-content-center align-items-center gap-3 mt-25 mb-30">
                  <button class="btn btn-default" [disabled]="page() === 1" (click)="paginaAnterior()">Anterior</button>
                  <span>Página {{ page() }} de {{ lastPage() }}</span>
                  <button class="btn btn-default" [disabled]="page() === lastPage()" (click)="siguientePagina()">Siguiente</button>
               </div>
            }
         </div>
      </div>
   </div>
</div>
